# Production override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      target: production
    environment:
      ENVIRONMENT: production
    volumes: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  frontend:
    build:
      target: production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: always

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  redis:
    restart: always

  minio:
    restart: always

  n8n:
    restart: always
